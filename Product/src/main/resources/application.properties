spring.application.name=Product
server.port=8082
spring.datasource.url=jdbc:mysql://localhost:3306/products_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=ROOT
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.output.ansi.enabled=always

spring.flyway.enabled=true

# Nivel global para toda la aplicación
logging.level.root=ERROR

# Nivel específico para tu código
logging.level.pr_Product.Product=DEBUG

# Nivel para librerías de terceros (ej. Hibernate)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org