server:
  port: 8090

spring:
  cloud:
    gateway:
      routes:
        - id: clients-service
          uri: http://clients-service:8091
          predicates:
            - Path=/api/v1/clients/**
          filters:
            - RewritePath=/api/v1/clients/(?<segment>.*), /api/v1/clients/${segment}

        - id: employee-service
          uri: http://employee-service:8099
          predicates:
            - Path=/api/v1/employees/**
          filters:
            - RewritePath=/api/v1/employees/(?<segment>.*), /api/v1/employees/${segment}

        - id: owner-service
          uri: http://owner-service:8093
          predicates:
            - Path=/api/v1/owners/**
          filters:
            - RewritePath=/api/v1/owners/(?<segment>.*), /api/v1/owners/${segment}

        - id: product-service
          uri: http://product-service:8092
          predicates:
            - Path=/api/v1/products/**
          filters:
            - RewritePath=/api/v1/products/(?<segment>.*), /api/v1/products/${segment}

        - id: saledetail-service
          uri: http://saledetail-service:8098
          predicates:
            - Path=/api/v1/sale-details/**
          filters:
            - RewritePath=/api/v1/sale-details/(?<segment>.*), /api/v1/sale-details/${segment}

        - id: sale-service
          uri: http://sale-service:8097
          predicates:
            - Path=/api/v1/sales/**
          filters:
            - RewritePath=/api/v1/sales/(?<segment>.*), /api/v1/sales/${segment}

        - id: stock-service
          uri: http://stock-service:8096
          predicates:
            - Path=/api/v1/stocks/**
          filters:
            - RewritePath=/api/v1/stocks/(?<segment>.*), /api/v1/stocks/${segment}

        - id: store-service
          uri: http://store-service:8095
          predicates:
            - Path=/api/v1/stores/**
          filters:
            - RewritePath=/api/v1/stores/(?<segment>.*), /api/v1/stores/${segment}

        - id: TypeEmployee-service
          uri: http://typeemployee-service:8100
          predicates:
            - Path=/api/v1/types-employee/**
          filters:
            - RewritePath=/api/v1/types-employee/(?<segment>.*), /api/v1/types-employee/${segment}

        - id: TypeStore-service
          uri: http://typestore-service:8094
          predicates:
            - Path=/api/v1/typestores/**
          filters:
            - RewritePath=/api/v1/typestores/(?<segment>.*), /api/v1/typesstores/${segment}

  # 👇 AQUI VA LO IMPORTANTE (SWAGGER)
springdoc:
  swagger-ui:
    path: /swagger
    urls:
      - name: clients-service
        url: /api/v1/clients/v3/api-docs

      - name: employee-service
        url: /api/v1/employees/v3/api-docs

      - name: owner-service
        url: /api/v1/owners/v3/api-docs

      - name: product-service
        url: /api/v1/products/v3/api-docs

      - name: saledetail-service
        url: /api/v1/sale-details/v3/api-docs

      - name: sale-service
        url: /api/v1/sales/v3/api-docs

      - name: stock-service
        url: /api/v1/stocks/v3/api-docs

      - name: store-service
        url: /api/v1/stores/v3/api-docs

      - name: TypeEmployee-service
        url: /api/v1/types-employee/v3/api-docs

      - name: TypeStore-service
        url: /api/v1/typestores/v3/api-docs

logging:
  level:
    org.springframework.cloud.gateway: TRACE