
services:
  mysql:
    image: mysql:8
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    networks:
      - microservices-net
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "8090:8090"
    depends_on:
      - clients-service
      - employee-service
      - owner-service
      - product-service
      - saledetail-service
      - sale-service
      - stock-service
      - store-service
      - typeemployee-service
      - typestore-service
    networks:
      - microservices-net

  clients-service:
    build: ./Cliente
    container_name: clients-service
    ports:
      - "8091:8091"
    networks:
      - microservices-net

  employee-service:
    build: ./Employee
    container_name: employee-service
    ports:
      - "8099:8099"
    networks:
      - microservices-net

  owner-service:
    build: ./Owner/Owner
    container_name: owner-service
    ports:
      - "8093:8093"
    networks:
      - microservices-net

  product-service:
    build: ./Product
    container_name: product-service
    ports:
      - "8092:8092"
    networks:
      - microservices-net

  saledetail-service:
    build: ./Sale-Detail
    container_name: saledetail-service
    ports:
      - "8098:8098"
    networks:
      - microservices-net

  sale-service:
    build: ./Sales
    container_name: sale-service
    ports:
      - "8097:8097"
    networks:
      - microservices-net

  stock-service:
    build: ./Stock
    container_name: stock-service
    ports:
      - "8096:8096"
    networks:
      - microservices-net

  store-service:
    build: ./Store
    container_name: store-service
    ports:
      - "8095:8095"
    networks:
      - microservices-net

  typeemployee-service:
    build: ./Type-Employee
    container_name: typeemployee-service
    ports:
      - "8100:8100"
    networks:
      - microservices-net

  typestore-service:
    build: ./Type-Store
    container_name: typestore-service
    ports:
      - "8094:8094"
    networks:
      - microservices-net

networks:
  microservices-net:
    driver: bridge