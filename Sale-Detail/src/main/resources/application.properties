spring.application.name=Sale-Detail
server.port=8098
spring.datasource.url=jdbc:mysql://mysql:3306/sale_details_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.output.ansi.enabled=always

spring.flyway.enabled=true

# Nivel global para toda la aplicación
logging.level.root=ERROR

# Nivel específico para tu código
logging.level.Sale_Detail.Sale_Detail=DEBUG

# Nivel para librerías de terceros (ej. Hibernate)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org
